<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savings - Cache Reset</title>
<style>
body{font-family:-apple-system,sans-serif;background:#0f0e0d;color:#f0ece6;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;text-align:center;}
h1{font-size:1.4rem;margin-bottom:8px;color:#d4913f}
p{color:#9a9088;font-size:.9rem;margin-bottom:28px;line-height:1.5}
button{background:#d4913f;color:#fff;border:none;border-radius:14px;padding:14px 32px;font-size:1rem;font-weight:600;cursor:pointer;margin:6px;width:100%;max-width:300px}
button.sec{background:#1e1c18;border:1px solid #3a3830;color:#9a9088}
#status{margin-top:20px;padding:14px;background:#1e1c18;border-radius:12px;font-size:.85rem;color:#9a9088;min-height:60px;width:100%;max-width:300px;line-height:1.6}
.ok{color:#4caf7d}
.err{color:#e05c4b}
</style>
</head>
<body>
<h1>⚠️ Cache Reset</h1>
<p>De app toont nog de oude versie.<br>Tik op de knop om alles te wissen en opnieuw te laden.</p>
<button onclick="doReset()">🗑 Cache wissen & herladen</button>
<button class="sec" onclick="window.location='./index.html?v='+Date.now()">Gewoon openen zonder reset</button>
<div id="status">Wacht op actie...</div>

<script>
async function doReset(){
  const s = document.getElementById('status');
  s.textContent = 'Bezig...';
  let log = '';

  try {
    // 1. Unregister all service workers
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      for(const reg of regs){
        await reg.unregister();
        log += '✓ Service worker verwijderd\n';
      }
      if(!regs.length) log += '— Geen service workers gevonden\n';
    }

    // 2. Delete all caches
    if('caches' in window){
      const keys = await caches.keys();
      for(const key of keys){
        await caches.delete(key);
        log += '✓ Cache gewist: ' + key + '\n';
      }
      if(!keys.length) log += '— Geen caches gevonden\n';
    }

    log += '\n✅ Klaar! Doorsturen naar app...';
    s.innerHTML = '<span class="ok">' + log.replace(/\n/g,'<br>') + '</span>';

    // 3. Redirect to fresh app after short delay
    setTimeout(()=>{
      window.location = './index.html?nocache=' + Date.now();
    }, 1500);

  } catch(e) {
    s.innerHTML = '<span class="err">Fout: ' + e.message + '</span>';
  }
}
</script>
</body>
</html>
